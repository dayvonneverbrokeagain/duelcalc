<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>duelcalc.pl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Kursy</h1>

    <div class="rate" id="rateInfo">
        Ładowanie kursów...
    </div>

    <div class="section">


        <div class="currency-box">

            <input
                class="currency-input"
                id="usd"
                type="text"
                inputmode="decimal"
                step="any"
                placeholder="0">

            <div class="currency-right">
                <img
                    class="flag"
                    src="https://flagcdn.com/w40/us.png"
                    alt="USD">

                <span>USD</span>
            </div>

        </div>

    </div>

    <div class="arrow-container">
        <div class="arrow">⇅</div>
    </div>

    <div class="section">


        <div class="currency-box">

            <input
                class="currency-input"
                id="pln"
                type="text"
                inputmode="decimal"
                step="any"
                placeholder="0">

            <div class="currency-right">
                <img
                    class="flag"
                    src="https://flagcdn.com/w40/pl.png"
                    alt="PLN">

                <span>PLN</span>
            </div>

        </div>

    </div>

    <div class="arrow-container">
        <div class="arrow">⇅</div>
    </div>

    <div class="section">


        <div class="currency-box">

            <input
                class="currency-input"
                id="ars"
                type="text"
                inputmode="decimal"
                step="any"
                placeholder="0">

            <div class="currency-right">
                <img
                    class="flag"
                    src="https://flagcdn.com/w40/ar.png"
                    alt="ARS">

                <span>ARS</span>
            </div>

        </div>

    </div>

        <div class="arrow-container">
            <div class="arrow">⇅</div>
    </div>

    <div class="section">


        <div class="currency-box">

            <input
                class="currency-input"
                id="sol"
                type="text"
                inputmode="decimal"
                step="any"
                placeholder="0">

            <div class="currency-right">
                <img
                    class="flag"
                    src="https://cryptologos.cc/logos/solana-sol-logo.png?v=040"
                    alt="SOL">

                <span>SOL</span>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
